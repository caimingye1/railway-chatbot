<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>家护家电智能客服</title>
    <style>
        body{font-family:Arial;margin:20px auto;max-width:700px;}
        #chat{border:1px solid #ddd;height:450px;padding:15px;overflow-y:auto;border-radius:8px;background:#f9f9f9;}
        .msg{margin:8px 0;padding:10px 14px;border-radius:15px;max-width:75%;}
        .user{background:#007bff;color:white;margin-left:auto;}
        .bot{background:#eee;color:#333;margin-right:auto;}
        #input{display:flex;margin-top:10px;gap:8px;}
        input{flex:1;padding:12px;border:1px solid #ddd;border-radius:6px;}
        button{padding:12px 16px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer;}
        .row{display:flex;}
    </style>
</head>
<body>
    <h2>🏠 家电智能客服（知识库版）</h2>
    <div id="chat"></div>
    <div id="input">
        <input id="text" placeholder="请输入问题...">
        <button onclick="send()">发送</button>
    </div>

    <script>
        // 你的真实信息 100% 填好
        const API_KEY = "sk-1ad8d6640edf44059ee0f95ca16ed2c7";
        const APP_ID = "69ef035f09b67baf6090e429";

        async function send() {
            const input = document.getElementById("text");
            const msg = input.value.trim();
            if (!msg) return;

            const chat = document.getElementById("chat");
            chat.innerHTML += `<div class="row"><div class="msg user">${msg}</div></div>`;
            input.value = "";

            // 加载中
            const loading = document.createElement("div");
            loading.className = "row";
            loading.innerHTML = `<div class="msg bot">正在查询知识库...</div>`;
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                // ✅ 这是【阿里云百炼应用/知识库】官方正确接口！
                const res = await fetch("https://dashscope.aliyuncs.com/api/v1/apps/completion", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        app_id: APP_ID,
                        prompt: msg,
                        stream: false
                    })
                });

                const data = await res.json();
                chat.removeChild(loading);

                const reply = data?.output?.text || "抱歉，知识库未找到答案";
                chat.innerHTML += `<div class="row"><div class="msg bot">${reply}</div></div>`;
                chat.scrollTop = chat.scrollHeight;

            } catch (e) {
                chat.removeChild(loading);
                chat.innerHTML += `<div class="row"><div class="msg bot">请求失败，请检查网络</div></div>`;
                console.error(e);
            }
        }

        document.getElementById("text").addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
